name: Selenium E2E Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PORT: 3000
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://ikqzhzrduftxtrojvvkr.supabase.co' }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder' }}
      LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY || 'placeholder' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install root dependencies
      run: npm install

    - name: Install Selenium tests dependencies
      run: |
        cd selenium-tests
        npm install

    - name: Build project
      run: npm run build

    - name: Start application server
      run: npm run dev &

    - name: Wait for server port
      run: npx wait-on http://localhost:3000/auth -t 90000

    - name: Run Selenium E2E Tests
      run: |
        cd selenium-tests
        npm run login
